version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: slooze_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: slooze
      POSTGRES_PASSWORD: slooze_secret
      POSTGRES_DB: slooze_food
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U slooze -d slooze_food']
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: slooze_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://slooze:slooze_secret@postgres:5432/slooze_food
      JWT_SECRET: super_secret_jwt_key_change_in_production
      JWT_EXPIRES_IN: 7d
      PORT: 3001
    ports:
      - '3001:3001'
    volumes:
      - ./backend:/app
      - /app/node_modules

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: slooze_frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_GRAPHQL_URL: http://localhost:3001/graphql
      NEXT_PUBLIC_WS_URL: ws://localhost:3001/graphql
    ports:
      - '3000:3000'
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next

volumes:
  postgres_data:
